services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alaz-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alaz}
      POSTGRES_DB: ${POSTGRES_DB:-alaz}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - alaz-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: alaz-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - alaz-qdrant-data:/qdrant/storage
    restart: unless-stopped

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: alaz-tei
    command: --model-id Qwen/Qwen3-Reranker-0.6B
    ports:
      - "${TEI_PORT:-8001}:80"
    volumes:
      - alaz-tei-data:/data
    restart: unless-stopped

  colbert-server:
    build: ./services/colbert-server
    container_name: alaz-colbert
    ports:
      - "${COLBERT_PORT:-8002}:80"
    volumes:
      - alaz-colbert-models:/root/.cache
    restart: unless-stopped

volumes:
  alaz-pg-data:
  alaz-qdrant-data:
  alaz-tei-data:
  alaz-colbert-models:
